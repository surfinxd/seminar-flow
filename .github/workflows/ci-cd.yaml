name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  GCP_PROJECT_ID: seminar-flow-2606
  GAR_LOCATION: asia-northeast3
  GAR_REPOSITORY: seminar-flow
  IMAGE_NAME: seminar-flow
  IMAGE_TAG: ${{ github.sha }}

# Grant write permissions to the GITHUB_TOKEN to allow pushing Kustomize updates back to the repo
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        python -m pytest

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        token_format: 'access_token'
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Login to Google Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.access_token }}

    - name: Build, tag, and push image to Google Artifact Registry
      env:
        REGISTRY: ${{ env.GAR_LOCATION }}-docker.pkg.dev
      run: |
        docker build -t $REGISTRY/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/$IMAGE_NAME:$IMAGE_TAG .
        docker push $REGISTRY/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/$IMAGE_NAME:$IMAGE_TAG

    - name: Update Kustomize image tag
      env:
        REGISTRY: ${{ env.GAR_LOCATION }}-docker.pkg.dev
      run: |
        cd k8s/overlays/dev
        kustomize edit set image seminar-flow=$REGISTRY/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/$IMAGE_NAME:$IMAGE_TAG
        
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/overlays/dev/kustomization.yaml
        # Commit and push only if there are changes to avoid workflow errors, and use [skip ci] to prevent infinite loops
        if ! git diff --cached --quiet; then
          git commit -m "chore(gitops): update image tag to ${{ env.IMAGE_TAG }} [skip ci]"
          git push
        else
          echo "No changes in kustomization.yaml to commit."
        fi
