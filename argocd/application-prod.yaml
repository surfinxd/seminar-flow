apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seminar-flow-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/surfinxd/seminar-flow.git'
    path: k8s/overlays/prod
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
