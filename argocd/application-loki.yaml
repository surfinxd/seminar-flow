apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-monitoring
  namespace: argocd
spec:
  project: default
  source:
    chart: loki-stack
    repoURL: 'https://grafana.github.io/helm-charts'
    targetRevision: 2.10.2
    helm:
      values: |
        loki:
          enabled: true
          persistence:
            enabled: true
            size: 10Gi
          config:
            limits_config:
              ingestion_rate_mb: 15
              ingestion_burst_size_mb: 30
            schema_config:
              configs:
                - from: 2020-10-24
                  store: boltdb-shipper
                  object_store: filesystem
                  schema: v11
                  index:
                    prefix: index_
                    period: 24h
        promtail:
          enabled: true
          config:
            lokiAddress: http://loki-monitoring:3100/loki/api/v1/push
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
