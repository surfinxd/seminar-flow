apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seminar-flow-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/surfinxd/seminar-flow.git'
    path: k8s/overlays/dev
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
